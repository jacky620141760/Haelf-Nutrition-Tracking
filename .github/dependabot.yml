version: 2
updates:
  - package-ecosystem: npm
    directory: /haelf-nutrition
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      expo:
        patterns:
          - expo
          - expo-*
          - "@expo/*"
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
